      return text.toLowerCase()
        .replace(/[&]/g, 'and')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-|-$/g, '');
    }

    function loadService() {
      const id = window.location.hash.replace('#', '') || new URLSearchParams(window.location.search).get('id');
      const container = document.getElementById('svc-content');
      const svc = services[id];

      if (!svc) {
        container.innerHTML = `<div id="svc-not-found">
          <p style="font-size:1rem;margin-bottom:20px;">Service not found.</p>
          <a href="services.html" class="btn">Back to Services</a>
        </div>`;
        return;
      }

      document.title = svc.title + ' – Psychic Tulsi Ram';

      const benefitsHTML = svc.benefits.map(b => `<li>${b}</li>`).join('');

      container.innerHTML = `
        <div class="svc-detail-image-wrap">
          <img src="${svc.image}" alt="${svc.title}">
        </div>
        <div class="svc-detail-content">
          <a href="services.html" class="back-link">&#8592; Back to Services</a>
          <span class="section-tag">Our Services</span>
          <h1>${svc.title}</h1>
          <p class="desc">${svc.description}</p>
          <ul class="benefits">${benefitsHTML}</ul>
          <div class="svc-detail-actions">
            <a href="contact.html" class="btn">Book Now</a>
            <a href="services.html" class="btn-ghost">All Services</a>
          </div>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', loadService);
  </script>
  <script src="script.js"></script>
</body>
</html>
